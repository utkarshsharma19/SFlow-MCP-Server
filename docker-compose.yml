services:
  sflow-rt:
    image: sflow/sflow-rt:latest
    ports:
      - '6343:6343/udp'   # sFlow listener
      - '8008:8008'        # RESTflow API
    environment:
      - RTPROP=-Dscript.file=/data/top.js

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowmind
      POSTGRES_USER: flowmind
      POSTGRES_PASSWORD: flowmind_dev
    ports: ['5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - '16686:16686'   # Jaeger UI
      - '4317:4317'     # OTLP gRPC receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  telemetry-api:
    build:
      context: .
      dockerfile: apps/telemetry-api/Dockerfile
    ports: ['8080:8080']
    environment:
      DATABASE_URL: postgresql+asyncpg://flowmind:flowmind_dev@postgres/flowmind
      REDIS_URL: redis://redis:6379
      SFLOW_RT_URL: http://sflow-rt:8008
      API_KEYS: ${API_KEYS:-dev-insecure-key}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: flowmind-telemetry-api
      GNMI_TARGETS: ${GNMI_TARGETS:-}
      GNMI_USERNAME: ${GNMI_USERNAME:-admin}
      GNMI_PASSWORD: ${GNMI_PASSWORD:-}
      GNMI_POLL_INTERVAL_SECONDS: ${GNMI_POLL_INTERVAL_SECONDS:-60}
    depends_on: [postgres, redis, sflow-rt, jaeger]

  mcp-server:
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
    ports: ['8090:8090']
    environment:
      TELEMETRY_API_URL: http://telemetry-api:8080
      TELEMETRY_API_KEY: ${TELEMETRY_API_KEY:-dev-insecure-key}
    depends_on: [telemetry-api]

volumes:
  pgdata:
