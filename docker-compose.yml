version: '3.9'

services:
  sflow-rt:
    image: sflow/sflow-rt:latest
    ports:
      - '6343:6343/udp'   # sFlow listener
      - '8008:8008'        # RESTflow API
    environment:
      - RTPROP=-Dscript.file=/data/top.js

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowmind
      POSTGRES_USER: flowmind
      POSTGRES_PASSWORD: flowmind_dev
    ports: ['5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']

  telemetry-api:
    build: ./apps/telemetry-api
    ports: ['8080:8080']
    environment:
      DATABASE_URL: postgresql+asyncpg://flowmind:flowmind_dev@postgres/flowmind
      REDIS_URL: redis://redis:6379
      SFLOW_RT_URL: http://sflow-rt:8008
    depends_on: [postgres, redis, sflow-rt]

  mcp-server:
    build: ./apps/mcp-server
    ports: ['8090:8090']
    environment:
      TELEMETRY_API_URL: http://telemetry-api:8080
    depends_on: [telemetry-api]

volumes:
  pgdata:
